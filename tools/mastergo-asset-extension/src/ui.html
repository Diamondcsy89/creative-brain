<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>小米图素延展助手</title>
    <style>
      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        background: #f7f7f5;
        color: #111;
        font-family: Inter, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      }

      main {
        padding: 16px;
      }

      section {
        border: 1px solid #cfcfcf;
        background: #fff;
        padding: 16px;
      }

      p {
        margin: 0;
      }

      label {
        display: block;
        margin-top: 12px;
        color: #555;
        font-size: 12px;
        font-weight: 700;
      }

      input,
      select {
        width: 100%;
        height: 38px;
        margin-top: 6px;
        border: 1px solid #cfcfcf;
        border-radius: 4px;
        background: #fff;
        color: #111;
        padding: 0 10px;
        font: inherit;
        font-size: 13px;
      }

      .eyebrow {
        color: #ff6900;
        font-size: 11px;
        font-weight: 800;
        letter-spacing: 0.16em;
        text-transform: uppercase;
      }

      h1 {
        margin: 8px 0 0;
        font-size: 18px;
      }

      .body {
        margin-top: 10px;
        color: #555;
        font-size: 13px;
        line-height: 1.6;
      }

      button {
        width: 100%;
        height: 42px;
        margin-top: 16px;
        border: 1px solid #111;
        border-radius: 4px;
        background: #111;
        color: #fff;
        font-weight: 800;
        cursor: pointer;
      }

      button:active {
        transform: translateY(1px);
      }

      #status {
        min-height: 58px;
        margin-top: 12px;
        border-left: 2px solid #ff6900;
        background: #f7f7f5;
        padding: 9px 10px;
        color: #555;
        font-size: 12px;
        line-height: 1.5;
      }

      #status.error {
        border-left-color: #d92d20;
        color: #9a1c14;
      }
    </style>
  </head>
  <body>
    <main>
      <section>
        <p class="eyebrow">xiaomi-asset-extension</p>
        <h1>小米图素延展助手</h1>
        <p class="body">根据合作方尺寸规范生成可编辑的多尺寸图素工作画板。</p>

        <label for="partner">合作方选择</label>
        <select id="partner">
          <option value="partner-xiaomi-demo">partner-xiaomi-demo</option>
        </select>

        <label for="sizeGroup">尺寸组选择</label>
        <select id="sizeGroup">
          <option value="xiaomi-demo-core">小米 Demo 基础三图</option>
        </select>

        <label for="projectName">项目名称</label>
        <input id="projectName" value="xiaomi-campaign" />

        <label for="headline">主标题</label>
        <input id="headline" value="小米商城会员专属礼遇" />

        <label for="subheadline">副标题</label>
        <input id="subheadline" value="为电商视觉快速延展多尺寸可编辑画板" />

        <label for="cta">CTA 文案</label>
        <input id="cta" value="立即查看" />

        <button id="generate">生成图素画板</button>
        <p id="status">等待操作</p>
      </section>
    </main>

    <script>
      const statusNode = document.getElementById("status");
      const statusLog = ["等待操作"];

      document.getElementById("generate").addEventListener("click", () => {
        try {
          const requestId = `generate-${Date.now()}-${Math.random().toString(16).slice(2)}`;

          resetStatus("已点击生成按钮");
          sendPluginMessage({
            type: "generate-asset-boards",
            requestId,
            payload: collectFormData()
          });
          appendStatus("已发送生成消息");
        } catch (error) {
          appendStatus(`按钮点击失败：${getErrorMessage(error)}`, true);
        }
      });

      window.addEventListener("message", (event) => {
        const message = normalizeIncomingMessage(event.data);
        if (!message) return;

        if (message.type === "status") {
          appendStatus(message.message);
        }

        if (message.type === "error") {
          appendStatus(message.message, true);
        }
      });

      function sendPluginMessage(message) {
        window.parent.postMessage({ pluginMessage: message }, "*");
      }

      function collectFormData() {
        return {
          partnerId: document.getElementById("partner").value,
          sizeGroupId: document.getElementById("sizeGroup").value,
          projectName: document.getElementById("projectName").value,
          headline: document.getElementById("headline").value,
          subheadline: document.getElementById("subheadline").value,
          cta: document.getElementById("cta").value
        };
      }

      function normalizeIncomingMessage(data) {
        if (!data) return null;
        if (data.pluginMessage) return data.pluginMessage;
        return data;
      }

      function resetStatus(message) {
        statusLog.length = 0;
        appendStatus(message);
      }

      function appendStatus(message, isError = false) {
        statusLog.push(message);
        statusNode.innerHTML = statusLog.map((item) => `<span>${escapeHtml(item)}</span>`).join("<br />");
        statusNode.classList.toggle("error", isError);
      }

      function escapeHtml(value) {
        return value
          .replaceAll("&", "&amp;")
          .replaceAll("<", "&lt;")
          .replaceAll(">", "&gt;")
          .replaceAll("\"", "&quot;")
          .replaceAll("'", "&#039;");
      }

      function getErrorMessage(error) {
        return error instanceof Error ? error.message : String(error);
      }
    </script>
  </body>
</html>
