<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>小米图素延展助手</title>
    <style>
      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        background: #f7f7f5;
        color: #111;
        font-family: Inter, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      }

      main {
        padding: 18px;
      }

      section {
        border: 1px solid #cfcfcf;
        background: #fff;
        padding: 16px;
      }

      p {
        margin: 0;
      }

      .eyebrow {
        color: #ff6900;
        font-size: 11px;
        font-weight: 800;
        letter-spacing: 0.16em;
        text-transform: uppercase;
      }

      h1 {
        margin: 8px 0 0;
        font-size: 18px;
      }

      .body {
        margin-top: 10px;
        color: #555;
        font-size: 13px;
        line-height: 1.6;
      }

      button {
        width: 100%;
        height: 42px;
        margin-top: 16px;
        border: 1px solid #111;
        border-radius: 4px;
        background: #111;
        color: #fff;
        font-weight: 800;
        cursor: pointer;
      }

      #status {
        min-height: 58px;
        margin-top: 12px;
        border-left: 2px solid #ff6900;
        background: #f7f7f5;
        padding: 9px 10px;
        color: #555;
        font-size: 12px;
        line-height: 1.5;
      }

      #status.error {
        border-left-color: #d92d20;
        color: #9a1c14;
      }
    </style>
  </head>
  <body>
    <main>
      <section>
        <p class="eyebrow">xiaomi-asset-extension</p>
        <h1>小米图素延展助手</h1>
        <p class="body">插件已启动</p>
        <button id="generate">生成测试画板</button>
        <p id="status">等待操作</p>
      </section>
    </main>

    <script>
      const statusNode = document.getElementById("status");
      const statusLog = ["等待操作"];

      document.getElementById("generate").addEventListener("click", () => {
        try {
          const requestId = `generate-${Date.now()}-${Math.random().toString(16).slice(2)}`;

          resetStatus("已点击生成按钮");
          sendPluginMessage({
            type: "generate-test-board",
            requestId
          });
          appendStatus("已发送生成消息");
        } catch (error) {
          appendStatus(`按钮点击失败：${getErrorMessage(error)}`, true);
        }
      });

      window.addEventListener("message", (event) => {
        const message = normalizeIncomingMessage(event.data);
        if (!message) return;

        if (message.type === "status") {
          appendStatus(message.message);
        }

        if (message.type === "error") {
          appendStatus(message.message, true);
        }
      });

      function sendPluginMessage(message) {
        window.parent.postMessage({ pluginMessage: message }, "*");
      }

      function normalizeIncomingMessage(data) {
        if (!data) return null;
        if (data.pluginMessage) return data.pluginMessage;
        return data;
      }

      function resetStatus(message) {
        statusLog.length = 0;
        appendStatus(message);
      }

      function appendStatus(message, isError = false) {
        statusLog.push(message);
        statusNode.innerHTML = statusLog.map((item) => `<span>${escapeHtml(item)}</span>`).join("<br />");
        statusNode.classList.toggle("error", isError);
      }

      function escapeHtml(value) {
        return value
          .replaceAll("&", "&amp;")
          .replaceAll("<", "&lt;")
          .replaceAll(">", "&gt;")
          .replaceAll("\"", "&quot;")
          .replaceAll("'", "&#039;");
      }

      function getErrorMessage(error) {
        return error instanceof Error ? error.message : String(error);
      }
    </script>
  </body>
</html>
