<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>小米图素延展助手</title>
    <style>
      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        background: #f7f7f5;
        color: #111;
        font-family: Inter, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      }

      main {
        padding: 18px;
      }

      section {
        border: 1px solid #cfcfcf;
        background: #fff;
        padding: 16px;
      }

      p {
        margin: 0;
      }

      .eyebrow {
        color: #ff6900;
        font-size: 11px;
        font-weight: 800;
        letter-spacing: 0.16em;
        text-transform: uppercase;
      }

      h1 {
        margin: 8px 0 0;
        font-size: 18px;
      }

      .body {
        margin-top: 10px;
        color: #555;
        font-size: 13px;
        line-height: 1.6;
      }

      button {
        width: 100%;
        height: 42px;
        margin-top: 16px;
        border: 1px solid #111;
        border-radius: 4px;
        background: #111;
        color: #fff;
        font-weight: 800;
        cursor: pointer;
      }
    </style>
  </head>
  <body>
    <main>
      <section>
        <p class="eyebrow">xiaomi-asset-extension</p>
        <h1>小米图素延展助手</h1>
        <p class="body">插件已启动</p>
        <button id="generate">生成测试画板</button>
      </section>
    </main>

    <script>
      document.getElementById("generate").addEventListener("click", () => {
        parent.postMessage({
          pluginMessage: {
            type: "generate-test-board"
          }
        }, "*");
      });
    </script>
  </body>
</html>
